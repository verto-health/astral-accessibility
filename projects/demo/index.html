<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Astral Accessibility</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="home-page">
      <div class="card">
        <div class="header">
          <div class="header-text">
            <h1>Astral Accessibility</h1>
          </div>
        </div>
        <div id="app-root"></div>
      </div>
    </div>

    <script src="main.js"></script>
    <script>
      initializeAstral({
        enabledFeatures: [
          "Screen Reader",
          "Contrast",
          "Saturation",
          "Bigger Text",
          "Text Spacing",
          "Screen Mask",
          "Line Height",
        ],
      });
    </script>
    <script type="module">
      import { h, render } from "https://esm.sh/preact@10";
      import { useState, useEffect } from "https://esm.sh/preact@10/hooks";
      import htm from "https://esm.sh/htm@3";
      import { DEMO_TRANSLATIONS } from "./demo-translations.js";

      const html = htm.bind(h);

      // --- Simple hash router ---
      function getRoute() {
        return location.hash.replace(/^#\/?/, "") || "";
      }

      function Link({ href, children, ...props }) {
        const [active, setActive] = useState(
          getRoute() === href.replace(/^#\/?/, ""),
        );
        useEffect(() => {
          const onHash = () =>
            setActive(getRoute() === href.replace(/^#\/?/, ""));
          window.addEventListener("hashchange", onHash);
          return () => window.removeEventListener("hashchange", onHash);
        }, [href]);
        return html`<a href=${href} class=${active ? "active" : ""} ...${props}
          >${children}</a
        >`;
      }

      // --- Nav ---
      function Nav({ t, language, onLanguageChange }) {
        return html`
          <nav>
            <div class="nav-links">
              <${Link} href="#/">${t.nav.home}<//>
              <${Link} href="#/screen-reader">${t.nav.screenReader}<//>
              <${Link} href="#/contrast">${t.nav.contrast}<//>
              <${Link} href="#/saturation">${t.nav.saturation}<//>
              <${Link} href="#/bigger-text">${t.nav.biggerText}<//>
              <${Link} href="#/text-spacing">${t.nav.textSpacing}<//>
              <${Link} href="#/screen-mask">${t.nav.screenMask}<//>
              <${Link} href="#/line-height">${t.nav.lineHeight}<//>
              <${Link} href="#/customizations">${t.nav.customizations}<//>
            </div>
            <select
              class="lang-select"
              value=${language}
              onChange=${(e) => onLanguageChange(e.target.value)}
              aria-label="Select language"
            >
              <option value="en">English</option>
              <option value="fr">Français</option>
              <option value="zh-Hant">繁體中文</option>
            </select>
          </nav>
        `;
      }

      // --- Pages ---
      function HomePage({ t }) {
        const p = t.home;
        const nav = t.nav;
        return html`
          <div class="page">
            <h2>${p.h2}</h2>
            <p class="subtitle">${p.subtitle}</p>
            <h3>${p.h3Features}</h3>
            <p>${p.featuresIntro}</p>
            <ul>
              <li>
                <a href="#/screen-reader">${nav.screenReader}</a> —
                ${p.featureScreenReaderDesc}
              </li>
              <li>
                <a href="#/contrast">${nav.contrast}</a> —
                ${p.featureContrastDesc}
              </li>
              <li>
                <a href="#/saturation">${nav.saturation}</a> —
                ${p.featureSaturationDesc}
              </li>
              <li>
                <a href="#/bigger-text">${nav.biggerText}</a> —
                ${p.featureBiggerTextDesc}
              </li>
              <li>
                <a href="#/text-spacing">${nav.textSpacing}</a> —
                ${p.featureTextSpacingDesc}
              </li>
              <li>
                <a href="#/screen-mask">${nav.screenMask}</a> —
                ${p.featureScreenMaskDesc}
              </li>
              <li>
                <a href="#/line-height">${nav.lineHeight}</a> —
                ${p.featureLineHeightDesc}
              </li>
            </ul>
            <h3>${p.h3About}</h3>
            <p>${p.aboutText}</p>
          </div>
        `;
      }

      function ScreenReaderPage({ t }) {
        const p = t.screenReader;
        return html`
          <div class="page">
            <h2>${p.h2}</h2>
            <p class="subtitle">${p.subtitle}</p>
            <h3>${p.h3TryIt}</h3>
            <p>${p.tryItP1}</p>
            <p>${p.tryItP2}</p>
            <h3>${p.h3AriaDemo}</h3>
            <p>${p.ariaP}</p>
            <button aria-label=${p.buttonAriaLabel}>${p.buttonText}</button>
            <h3>${p.h3PlainText}</h3>
            <p>${p.plainP1}</p>
            <p>${p.plainP2}</p>
          </div>
        `;
      }

      function ContrastPage({ t }) {
        const p = t.contrast;
        return html`
          <div class="page">
            <h2>${p.h2}</h2>
            <p class="subtitle">${p.subtitle}</p>
            <h3>${p.h3WhyMatters}</h3>
            <p>${p.whyP1}</p>
            <p>${p.whyP2}</p>
            <h3>${p.h3Enable}</h3>
            <p>${p.enableP1}</p>
            <p>${p.enableP2}</p>
          </div>
        `;
      }

      function SaturationPage({ t }) {
        const p = t.saturation;
        return html`
          <div class="page">
            <h2>${p.h2}</h2>
            <p class="subtitle">${p.subtitle}</p>
            <h3>${p.h3WhoBenefits}</h3>
            <p>${p.whoP1}</p>
            <p>${p.whoP2}</p>
            <h3>${p.h3ColoredDemo}</h3>
            <p style="color: #0055cc">${p.blueText}</p>
            <p style="color: #cc4400">${p.orangeText}</p>
            <p style="color: #007700">${p.greenText}</p>
            <p>${p.coloredP}</p>
          </div>
        `;
      }

      function BiggerTextPage({ t }) {
        const p = t.biggerText;
        return html`
          <div class="page">
            <h2>${p.h2}</h2>
            <p class="subtitle">${p.subtitle}</p>
            <h3>${p.h3HowWorks}</h3>
            <p>${p.howP1}</p>
            <p>${p.howP2}</p>
            <h3>${p.h3SampleText}</h3>
            <p style="font-size: 12px">${p.sample12px}</p>
            <p style="font-size: 16px">${p.sample16px}</p>
            <p style="font-size: 20px">${p.sample20px}</p>
            <h3>${p.h3Navigate}</h3>
            <p>${p.navigateP}</p>
          </div>
        `;
      }

      function TextSpacingPage({ t }) {
        const p = t.textSpacing;
        return html`
          <div class="page">
            <h2>${p.h2}</h2>
            <p class="subtitle">${p.subtitle}</p>
            <h3>${p.h3Benefits}</h3>
            <p>${p.benefitsP1}</p>
            <p>${p.benefitsP2}</p>
            <h3>${p.h3DenseDemo}</h3>
            <p>${p.denseIntro}</p>
            <p style="font-size: 0.9rem; max-width: 600px">${p.denseText}</p>
          </div>
        `;
      }

      function ScreenMaskPage({ t }) {
        const p = t.screenMask;
        return html`
          <div class="page">
            <h2>${p.h2}</h2>
            <p class="subtitle">${p.subtitle}</p>
            <h3>${p.h3WhoHelps}</h3>
            <p>${p.whoP1}</p>
            <p>${p.whoP2}</p>
            <h3>${p.h3TryHere}</h3>
            <p>${p.tryP1}</p>
            <p>${p.tryP2}</p>
            <p>${p.tryP3}</p>
            <p style="margin-bottom: 2rem">${p.line1}</p>
            <p style="margin-bottom: 2rem">${p.line2}</p>
            <p style="margin-bottom: 2rem">${p.line3}</p>
          </div>
        `;
      }

      function LineHeightPage({ t }) {
        const p = t.lineHeight;
        return html`
          <div class="page">
            <h2>${p.h2}</h2>
            <p class="subtitle">${p.subtitle}</p>
            <h3>${p.h3WhyMatters}</h3>
            <p>${p.whyP1}</p>
            <p>${p.whyP2}</p>
            <h3>${p.h3DenseDemo}</h3>
            <p style="line-height: 1.2; max-width: 620px">${p.denseP}</p>
            <h3>${p.h3NormalPara}</h3>
            <p>${p.normalP}</p>
          </div>
        `;
      }

      // --- Customizations ---
      const ALL_FEATURES = [
        "Screen Reader",
        "Contrast",
        "Saturation",
        "Bigger Text",
        "Text Spacing",
        "Screen Mask",
        "Line Height",
      ];

      const FEATURE_LABEL_KEYS = {
        "Screen Reader": "screenReader",
        Contrast: "contrast",
        Saturation: "saturation",
        "Bigger Text": "biggerText",
        "Text Spacing": "textSpacing",
        "Screen Mask": "screenMask",
        "Line Height": "lineHeight",
      };

      const POSITIONS = [
        "bottom-right",
        "bottom-left",
        "top-right",
        "top-left",
      ];

      function defaultCustomization() {
        const enabledFeatures = {};
        ALL_FEATURES.forEach((f) => (enabledFeatures[f] = true));
        return {
          compact: false,
          enabledFeatures,
          position: "bottom-right",
          toggleColor: "",
          toggleIconColor: "",
          customStyles: [],
        };
      }

      function buildAstralOptions(custom, language) {
        const options = {
          enabledFeatures: ALL_FEATURES.filter(
            (f) => custom.enabledFeatures[f],
          ),
          position: custom.position,
        };
        if (custom.compact) options.compact = true;
        if (custom.toggleColor) options.toggleColor = custom.toggleColor;
        if (custom.toggleIconColor)
          options.toggleIconColor = custom.toggleIconColor;
        const styles = custom.customStyles
          .map((r) => [r.property.trim(), r.value.trim()])
          .filter(([k, v]) => k && v);
        if (styles.length) {
          options.customStyles = Object.fromEntries(styles);
        }
        if (language && language !== "en") options.language = language;
        return options;
      }

      function CustomizationsPage({
        t,
        language,
        customization,
        setCustomization,
        onSave,
        lastSavedAt,
      }) {
        const p = t.customizations;

        function toggleCompact(e) {
          setCustomization({ ...customization, compact: e.target.checked });
        }

        function toggleFeature(name, checked) {
          setCustomization({
            ...customization,
            enabledFeatures: {
              ...customization.enabledFeatures,
              [name]: checked,
            },
          });
        }

        function setPosition(pos) {
          setCustomization({ ...customization, position: pos });
        }

        function setColorField(field, value) {
          setCustomization({ ...customization, [field]: value });
        }

        function updateStyleRow(index, field, value) {
          const rows = customization.customStyles.map((r, i) =>
            i === index ? { ...r, [field]: value } : r,
          );
          setCustomization({ ...customization, customStyles: rows });
        }

        function addStyleRow() {
          setCustomization({
            ...customization,
            customStyles: [
              ...customization.customStyles,
              { property: "", value: "" },
            ],
          });
        }

        function removeStyleRow(index) {
          setCustomization({
            ...customization,
            customStyles: customization.customStyles.filter(
              (_, i) => i !== index,
            ),
          });
        }

        return html`
          <div class="page customizations">
            <h2>${p.h2}</h2>
            <p class="subtitle">${p.subtitle}</p>

            <h3>${p.h3General}</h3>
            <label class="cust-row">
              <input
                type="checkbox"
                checked=${customization.compact}
                onChange=${toggleCompact}
              />
              <span>
                <strong>${p.compactLabel}</strong>
                <span class="cust-help">${p.compactHelp}</span>
              </span>
            </label>

            <h3>${p.h3Features}</h3>
            <div class="cust-grid">
              ${ALL_FEATURES.map(
                (f) => html`
                  <label class="cust-row" key=${f}>
                    <input
                      type="checkbox"
                      checked=${customization.enabledFeatures[f]}
                      onChange=${(e) => toggleFeature(f, e.target.checked)}
                    />
                    <span>${t.nav[FEATURE_LABEL_KEYS[f]]}</span>
                  </label>
                `,
              )}
            </div>

            <h3>${p.h3Position}</h3>
            <div class="cust-grid">
              ${POSITIONS.map(
                (pos) => html`
                  <label class="cust-row" key=${pos}>
                    <input
                      type="radio"
                      name="cust-position"
                      checked=${customization.position === pos}
                      onChange=${() => setPosition(pos)}
                    />
                    <span>
                      ${p[
                        "position" +
                          pos
                            .split("-")
                            .map((s) => s.charAt(0).toUpperCase() + s.slice(1))
                            .join("")
                      ]}
                    </span>
                  </label>
                `,
              )}
            </div>

            <h3>${p.h3Colors}</h3>
            <div class="cust-color-row">
              <label>
                <span>${p.toggleColorLabel}</span>
                <span class="cust-color-input">
                  <input
                    type="color"
                    value=${customization.toggleColor || "#ffcb00"}
                    onInput=${(e) =>
                      setColorField("toggleColor", e.target.value)}
                  />
                  <input
                    type="text"
                    placeholder="#ffcb00"
                    value=${customization.toggleColor}
                    onInput=${(e) =>
                      setColorField("toggleColor", e.target.value)}
                  />
                </span>
              </label>
              <label>
                <span>${p.toggleIconColorLabel}</span>
                <span class="cust-color-input">
                  <input
                    type="color"
                    value=${customization.toggleIconColor || "#000000"}
                    onInput=${(e) =>
                      setColorField("toggleIconColor", e.target.value)}
                  />
                  <input
                    type="text"
                    placeholder="#000000"
                    value=${customization.toggleIconColor}
                    onInput=${(e) =>
                      setColorField("toggleIconColor", e.target.value)}
                  />
                </span>
              </label>
            </div>

            <h3>${p.h3CustomStyles}</h3>
            <p class="cust-help">${p.customStylesHelp}</p>
            ${customization.customStyles.map(
              (row, i) => html`
                <div class="cust-style-row" key=${i}>
                  <input
                    type="text"
                    placeholder=${p.propertyPlaceholder}
                    value=${row.property}
                    onInput=${(e) =>
                      updateStyleRow(i, "property", e.target.value)}
                  />
                  <input
                    type="text"
                    placeholder=${p.valuePlaceholder}
                    value=${row.value}
                    onInput=${(e) => updateStyleRow(i, "value", e.target.value)}
                  />
                  <button type="button" onClick=${() => removeStyleRow(i)}>
                    ${p.removeRow}
                  </button>
                </div>
              `,
            )}
            <button type="button" class="cust-add" onClick=${addStyleRow}>
              + ${p.addRow}
            </button>

            <div class="cust-actions">
              <button type="button" class="cust-save" onClick=${onSave}>
                ${p.saveButton}
              </button>
              ${lastSavedAt
                ? html`<span class="cust-saved-at"
                    >${p.savedAt}: ${lastSavedAt}</span
                  >`
                : null}
            </div>
          </div>
        `;
      }

      // --- Router ---
      function Router({
        route,
        t,
        language,
        customization,
        setCustomization,
        onSaveCustomization,
        lastSavedAt,
      }) {
        switch (route) {
          case "screen-reader":
            return html`<${ScreenReaderPage} t=${t} />`;
          case "contrast":
            return html`<${ContrastPage} t=${t} />`;
          case "saturation":
            return html`<${SaturationPage} t=${t} />`;
          case "bigger-text":
            return html`<${BiggerTextPage} t=${t} />`;
          case "text-spacing":
            return html`<${TextSpacingPage} t=${t} />`;
          case "screen-mask":
            return html`<${ScreenMaskPage} t=${t} />`;
          case "line-height":
            return html`<${LineHeightPage} t=${t} />`;
          case "customizations":
            return html`<${CustomizationsPage}
              t=${t}
              language=${language}
              customization=${customization}
              setCustomization=${setCustomization}
              onSave=${onSaveCustomization}
              lastSavedAt=${lastSavedAt}
            />`;
          default:
            return html`<${HomePage} t=${t} />`;
        }
      }

      // --- App root ---
      function App() {
        const [language, setLanguage] = useState("en");
        const [route, setRoute] = useState(getRoute());
        const [customization, setCustomization] = useState(
          defaultCustomization(),
        );
        const [lastSavedAt, setLastSavedAt] = useState("");

        useEffect(() => {
          const onHash = () => setRoute(getRoute());
          window.addEventListener("hashchange", onHash);
          return () => window.removeEventListener("hashchange", onHash);
        }, []);

        const t = DEMO_TRANSLATIONS[language];

        function handleLanguageChange(lang) {
          setLanguage(lang);
          document.documentElement.lang = lang;
          if (window.astralSetLanguage) window.astralSetLanguage(lang);
        }

        async function handleSaveCustomization() {
          const options = buildAstralOptions(customization, language);
          if (typeof window.initializeAstral === "function") {
            await window.initializeAstral(options);
          }
          setLastSavedAt(new Date().toLocaleTimeString());
        }

        return html`
          <${Nav}
            t=${t}
            language=${language}
            onLanguageChange=${handleLanguageChange}
          />
          <div class="introduction">
            <${Router}
              route=${route}
              t=${t}
              language=${language}
              customization=${customization}
              setCustomization=${setCustomization}
              onSaveCustomization=${handleSaveCustomization}
              lastSavedAt=${lastSavedAt}
            />
          </div>
        `;
      }

      // --- Mount ---
      render(html`<${App} />`, document.getElementById("app-root"));
    </script>
  </body>
</html>
