name: Worker Tests

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "yarn"

      - name: Install worker dependencies
        run: yarn install
        working-directory: workers/astral-cdn

      - name: Run Worker tests
        run: yarn test
        working-directory: workers/astral-cdn
