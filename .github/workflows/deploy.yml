name: Deploy CDN

on:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*"

concurrency:
  group: deploy-cdn
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install

      - name: Install worker dependencies
        run: yarn install
        working-directory: workers/astral-cdn

      - name: Build library
        run: yarn build:lib

      - name: Determine channel
        id: channel
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "name=latest" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch wrangler.jsonc with KV namespace ID
        run: |
          sed -i "s/<PASTE_KV_NAMESPACE_ID_HERE>/$KV_NAMESPACE_ID/" wrangler.jsonc
        working-directory: workers/astral-cdn
        env:
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}

      - name: Test Worker
        run: yarn test
        working-directory: workers/astral-cdn

      - name: Deploy Worker
        run: yarn wrangler deploy
        working-directory: workers/astral-cdn
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Publish to KV channel
        run: |
          yarn wrangler kv key put "$CHANNEL" \
            --path ../../dist/astral-accessibility-angular-output/main.js \
            --namespace-id "$KV_NAMESPACE_ID" \
            --remote
          echo "Published to KV channel: $CHANNEL"
        working-directory: workers/astral-cdn
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
          CHANNEL: ${{ steps.channel.outputs.name }}

      - name: Publish to KV as version (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if yarn wrangler kv key get "$VERSION" --namespace-id "$KV_NAMESPACE_ID" --remote &>/dev/null; then
            echo "Version $VERSION already exists in KV — skipping immutable write"
          else
            yarn wrangler kv key put "$VERSION" \
              --path ../../dist/astral-accessibility-angular-output/main.js \
              --namespace-id "$KV_NAMESPACE_ID" \
              --remote
            echo "Published $VERSION to KV"
          fi
        working-directory: workers/astral-cdn
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
          VERSION: ${{ github.ref_name }}

      - name: Update versions list (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          EXISTING=$(yarn wrangler kv key get "versions" --namespace-id "$KV_NAMESPACE_ID" --remote 2>/dev/null || echo "[]")
          UPDATED=$(node -e "
            let v; try { v = JSON.parse(process.argv[2]); } catch (_) { v = []; }
            if (!Array.isArray(v)) v = [];
            const tag = process.argv[3];
            if (!v.includes(tag)) v.push(tag);
            process.stdout.write(JSON.stringify(v));
          " "$EXISTING" "$VERSION")
          printf '%s' "$UPDATED" > /tmp/versions.json
          yarn wrangler kv key put "versions" --path /tmp/versions.json --namespace-id "$KV_NAMESPACE_ID" --remote
          echo "versions list: $UPDATED"
        working-directory: workers/astral-cdn
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
          VERSION: ${{ github.ref_name }}

      - name: Smoke test
        run: |
          if [ -z "$WORKER_URL" ]; then
            echo "WORKER_URL secret not set — skipping smoke test"
            exit 0
          fi
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WORKER_URL/$CHANNEL/main.js")
            if [ "$STATUS" = "200" ]; then
              echo "Smoke test passed: HTTP $STATUS ($CHANNEL)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 5s..."
            sleep 5
          done
          echo "Smoke test FAILED after 5 attempts"
          exit 1
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          CHANNEL: ${{ steps.channel.outputs.name }}
